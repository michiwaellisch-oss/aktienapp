<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MichisAktien Real-Time</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div id="app">
      <aside class="sidebar">
        <div class="logo">
<img src="/logo.png" alt="MichisAktien Logo" style="width: 32px; height: 32px; border-radius: 6px;" />
          MichisAktien
        </div>

        <div class="search-container">
          <input
            type="text"
            id="symbol-search"
            class="search-input"
            placeholder="Symbol suchen (z.B. AAPL)..."
          />
        </div>

        <div class="watchlist" id="watchlist">
          <div class="watchlist-header">Watchlist</div>
          <!-- Stock items will go here -->
        </div>

        <div class="watchlist" id="recent-searches-container" style="margin-top: 1rem; display: none;">
          <div class="watchlist-header">Zuletzt gesucht</div>
          <div id="recent-searches">
            <!-- Recent search items will go here -->
          </div>
        </div>

        <div class="portfolio-panel">
          <div class="watchlist-header" style="margin-bottom: 0.5rem;">Mein Portfolio</div>
          <div class="portfolio-balance" id="portfolio-balance">$10,000.00</div>
          <div class="portfolio-pl" id="portfolio-pl">+$0.00 (0.00%)</div>
          
          <div class="holdings-list" id="holdings-list" style="margin-top: 1rem;">
            <!-- Holdings will appear here -->
          </div>
        </div>
      </aside>

      <main class="dashboard">
        <header class="header">
          <div class="stock-info">
            <div class="live-badge">
              <span class="dot"></span>
              Live Market Data
            </div>
            <h1 id="current-name">Tesla Inc.</h1>
            <p
              id="current-symbol"
              style="color: var(--text-dim); font-weight: 500"
            >
              TSLA
            </p>
          </div>
          <div class="price-info" style="text-align: right">
            <div
              id="current-price"
              class="metric-value"
              style="font-size: 2.5rem; font-weight: 800"
            >
              $0.00
            </div>
            <div
              id="price-change"
              class="metric-label"
              style="font-weight: 600"
            >
              +0.00%
            </div>
          </div>
          <div class="trade-actions">
            <input type="number" id="trade-qty" class="trade-input" value="1" min="1" step="1" />
            <button class="btn btn-buy" onclick="executeTrade('BUY')">KAUFEN</button>
            <button class="btn btn-sell" onclick="executeTrade('SELL')">VERKAUFEN</button>
            
            <div class="alert-container" style="position: relative; margin-left: 1rem;">
              <button class="btn btn-alert" onclick="toggleAlertMenu()">🔔 ALARM</button>
              <div class="alert-menu" id="alert-menu" style="display: none;">
                <input type="number" id="alert-price" class="search-input" placeholder="Zielpreis ($)" />
                <button class="btn btn-buy" style="margin-top: 0.5rem; width: 100%;" onclick="setAlert()">Setzen</button>
              </div>
            </div>
          </div>
        </header>

          <div class="dashboard-content">
            <section class="chart-container">
              <div id="chart"></div>
            </section>
            
            <aside class="news-container">
              <div class="news-header">Live Market News</div>
              <div id="news-feed" class="news-feed">
                <!-- News items go here -->
                <div class="news-placeholder">Lade Nachrichten...</div>
              </div>
            </aside>
          </div>

          <footer class="metrics-grid">
            <div class="metric-card">
              <div class="metric-label">High</div>
              <div id="metric-high" class="metric-value">--</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">Low</div>
              <div id="metric-low" class="metric-value">--</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">Open</div>
              <div id="metric-open" class="metric-value">--</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">Prev. Close</div>
              <div id="metric-close" class="metric-value">--</div>
            </div>
          </footer>

      </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
